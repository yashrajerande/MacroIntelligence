name: MacroIntelligence Corp - Daily Run

on:
  schedule:
    - cron: '30 21 * * *'   # 21:30 UTC = 03:00 IST
  workflow_dispatch:
    inputs:
      run_date_override:
        description: 'Override date (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: macro-intelligence/package-lock.json

      - name: Install dependencies
        working-directory: macro-intelligence
        run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "MacroIntelligence Corp"
          git config user.email "pipeline@macrointelligence.corp"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Pre-flight tests
        working-directory: macro-intelligence
        run: node test.js

      - name: Keep Supabase alive
        run: |
          curl -sf "$SUPABASE_URL/rest/v1/run_metadata?select=count&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" || echo "Supabase ping failed (may be paused)"
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Run pipeline
        working-directory: macro-intelligence
        run: node agents/CEO/orchestrate.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          DATE_OVERRIDE:        ${{ inputs.run_date_override }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          NODE_ENV:             production

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_id }}
          path: macro-intelligence/logs/
          retention-days: 7
