name: MacroIntelligence Corp - Manual Run

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Target date (YYYY-MM-DD). Defaults to today IST.'
        required: false
        default: ''
      skip_supabase:
        description: 'Skip Supabase write (dry run)?'
        required: false
        default: 'false'
      skip_git_push:
        description: 'Skip git push (local output only)?'
        required: false
        default: 'false'

jobs:
  manual-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: macro-intelligence/package-lock.json

      - name: Install dependencies
        working-directory: macro-intelligence
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "MacroIntelligence Corp"
          git config user.email "pipeline@macrointelligence.corp"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git

      - name: Run pipeline
        working-directory: macro-intelligence
        run: node agents/CEO/orchestrate.js
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          GH_PAT:              ${{ secrets.GH_PAT }}
          DATE_OVERRIDE:        ${{ inputs.run_date }}
          SKIP_SUPABASE:        ${{ inputs.skip_supabase }}
          SKIP_GIT_PUSH:        ${{ inputs.skip_git_push }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          NODE_ENV:             development

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: manual-run-${{ github.run_id }}
          path: |
            macro-intelligence/logs/
            macro-intelligence/output/
          retention-days: 14
