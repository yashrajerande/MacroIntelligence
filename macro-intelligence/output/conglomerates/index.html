<!DOCTYPE html>

<head>

<title>Conglomerates Tracker — Initialising</title>
<style>
:root{--ink:#0a0a14;--paper:#fafaf7;--muted:#6b6b78;--accent:#1a00cc;--rule:#e6e6e0;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'DM Mono',ui-monospace,monospace;}
main{max-width:760px;margin:80px auto;padding:0 32px;}
h1{font-family:'Syne',ui-sans-serif,system-ui;font-weight:700;font-size:28px;color:var(--accent);margin:0 0 12px;}
p{line-height:1.6;color:var(--muted);}
code{background:#fff;border:1px solid var(--rule);padding:1px 6px;border-radius:3px;}
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap');

<body>
<main>
<h1>Conglomerates Tracker</h1>
<p>This tab will populate on the 1st of each month with a fresh strategic-power
report on India's top 21 conglomerates — scored, ranked, and red-flagged.</p>
<p>If you are seeing this placeholder after the 1st, check the
<code>ConglomeratesTracker - Monthly Run</code> workflow on GitHub Actions.</p>
</main>
